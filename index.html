<!DOCTYPE html>
<html>
<body>
  <input id="a" type="number" placeholder="숫자1">
  <input id="b" type="number" placeholder="숫자2">
  <button onclick="calculate()">더하기</button>
  <p id="result"></p>

  <script>
    async function calculate() {
      const a = document.getElementById('a').value;
      const b = document.getElementById('b').value;
      const res = await fetch(`/api/add?a=${a}&b=${b}`);
      const data = await res.json();
      document.getElementById('result').innerText = '결과: ' + data.result;
    }
  </script>
</body>
</html>
